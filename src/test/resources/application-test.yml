server:
  port: 8081
spring:
  application:
    name: mod-requests-mediated
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  liquibase:
    enabled: true
  jpa:
    show-sql: false
folio:
  system-user:
    enabled: false
  tenant:
    secure-tenant-id: consortium
    validation:
      enabled: false
  batch-requests:
    print-result: true
    thread-pool-size: 1
management:
  endpoints:
    access:
      default: none
logging:
  level:
    org.springframework.web: debug
